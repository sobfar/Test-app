<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>بازی ایکس او</title>
  <style>
    @keyframes popIn {
      0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
      65%  { transform: scale(1.18) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes fadeRemove {
      to { opacity: 0.18; transform: scale(0.82); }
    }
    @keyframes winPulseX {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,211,238,0.5); }
      50%      { box-shadow: 0 0 0 10px rgba(34,211,238,0); }
    }
    @keyframes winPulseO {
      0%,100% { box-shadow: 0 0 0 0 rgba(244,114,182,0.5); }
      50%      { box-shadow: 0 0 0 10px rgba(244,114,182,0); }
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes scoreFlash {
      0%   { transform:scale(1); }
      50%  { transform:scale(1.45); }
      100% { transform:scale(1); }
    }
    @keyframes ghostPulse {
      0%,100% { opacity:0.28; }
      50%      { opacity:0.42; }
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; font-family:-apple-system,Tahoma,sans-serif; background:#060d1a; color:#f1f5f9; overflow:hidden; }
    body{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:18px; padding:20px; text-align:center;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(34,211,238,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(244,114,182,0.08) 0%, transparent 55%),
        #060d1a;
    }

    h1{
      font-size:24px; font-weight:900; letter-spacing:2px;
      background:linear-gradient(90deg,#22d3ee,#818cf8,#f472b6);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    #modeBar{
      display:flex; gap:6px; background:#0f172a; padding:5px;
      border-radius:16px; border:1px solid #1e293b;
    }
    .modeBtn{
      font-size:13px; font-weight:700; padding:9px 20px; border:none;
      border-radius:12px; background:transparent; color:#475569; cursor:pointer; transition:all 0.25s;
    }
    .modeBtn.active{
      background:linear-gradient(135deg,#22d3ee,#0ea5e9);
      color:#0f172a; box-shadow:0 4px 14px rgba(34,211,238,0.35);
    }

    #status{
      font-size:17px; font-weight:700; min-height:26px; color:#94a3b8;
      animation:slideDown 0.3s ease;
    }
    #status .hx{ color:#22d3ee; }
    #status .ho{ color:#f472b6; }

    /* Board */
    #board{
      display:grid;
      grid-template-columns:repeat(3,100px);
      grid-template-rows:repeat(3,100px);
      gap:10px;
    }

    .cell{
      background:#0f172a;
      border:1.5px solid #1e293b;
      border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      transition:border-color 0.2s, background 0.2s;
      position:relative;
    }
    .cell:not(:disabled):hover{ background:#1a2540; border-color:#2d3f5e; }
    .cell:disabled{ cursor:default; }

    /* Fancy X — two SVG lines */
    .cell .mark{ width:54px; height:54px; display:block; }

    /* pop animation wrapper */
    .cell.x-cell .mark, .cell.o-cell .mark{
      animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* win glow */
    .cell.win-x{ background:#071e2b; border-color:#22d3ee; animation:winPulseX 1.1s ease infinite; }
    .cell.win-o{ background:#23060f; border-color:#f472b6; animation:winPulseO 1.1s ease infinite; }

    /* ghost = next to be removed */
    .cell.ghost{
      border-color:#dc2626 !important;
      animation:ghostPulse 1.2s ease infinite;
    }
    .cell.ghost::after{
      content:'✕';
      position:absolute;
      top:4px; left:4px;
      font-size:10px;
      font-weight:900;
      color:#dc2626;
      opacity:0.8;
      line-height:1;
    }

    /* fading during removal */
    .cell.fading{ animation:fadeRemove 0.28s ease forwards; }

    /* Scores */
    #scoreBoard{ display:flex; gap:12px; }
    .scoreCard{
      background:#0f172a; border:1.5px solid #1e293b;
      border-radius:16px; padding:10px 20px;
      display:flex; flex-direction:column; align-items:center; gap:4px; min-width:78px;
    }
    .scoreLabel{ font-size:10px; font-weight:700; color:#475569; letter-spacing:1px; text-transform:uppercase; }
    .scoreNum{ font-size:28px; font-weight:900; line-height:1; }
    #scoreX .scoreNum{ color:#22d3ee; }
    #scoreO .scoreNum{ color:#f472b6; }
    .scoreNum.flash{ animation:scoreFlash 0.4s ease; }

    #resetBtn{
      font-size:14px; font-weight:700; padding:12px 28px; border:none;
      border-radius:14px; background:linear-gradient(135deg,#22d3ee,#0ea5e9);
      color:#0f172a; cursor:pointer; box-shadow:0 4px 14px rgba(34,211,238,0.28);
      transition:transform 0.15s, box-shadow 0.15s;
    }
    #resetBtn:active{ transform:scale(0.95); box-shadow:none; }

    #hint{ font-size:11px; color:#2a3a52; max-width:300px; line-height:1.7; }
  </style>
</head>
<body>
  <h1>ایکس او</h1>

  <div id="modeBar">
    <button class="modeBtn active" id="modePvP">👥 دو نفره</button>
    <button class="modeBtn" id="modeCPU">🤖 با ربات</button>
  </div>

  <div id="status">نوبت بازیکن <span class="hx">X</span></div>
  <div id="board"></div>

  <div id="scoreBoard">
    <div class="scoreCard" id="scoreX">
      <div class="scoreLabel">بازیکن X</div>
      <div class="scoreNum" id="numX">0</div>
    </div>
    <div class="scoreCard" id="scoreO">
      <div class="scoreLabel" id="labelO">بازیکن O</div>
      <div class="scoreNum" id="numO">0</div>
    </div>
  </div>

  <button id="resetBtn">🔄 شروع دوباره</button>
  <div id="hint">هر بازیکن حداکثر ۳ مهره دارد — مهره‌ی قرمزرنگ در حرکت بعدی همان بازیکن حذف می‌شود</div>

  <script>
    // ── SVG مهره‌های فانتزی ────────────────────────────────────────
    function makeX() {
      return `<svg class="mark" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gx1" x1="0" y1="0" x2="54" y2="54" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#67e8f9"/>
            <stop offset="100%" stop-color="#0ea5e9"/>
          </linearGradient>
          <filter id="glowX">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <line x1="9" y1="9" x2="45" y2="45" stroke="url(#gx1)" stroke-width="7" stroke-linecap="round" filter="url(#glowX)"/>
        <line x1="45" y1="9" x2="9" y2="45" stroke="url(#gx1)" stroke-width="7" stroke-linecap="round" filter="url(#glowX)"/>
      </svg>`;
    }

    function makeO() {
      return `<svg class="mark" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="go1" x1="0" y1="0" x2="54" y2="54" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f9a8d4"/>
            <stop offset="100%" stop-color="#db2777"/>
          </linearGradient>
          <filter id="glowO">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <circle cx="27" cy="27" r="17" stroke="url(#go1)" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="6 4" filter="url(#glowO)"/>
        <circle cx="27" cy="27" r="9" stroke="url(#go1)" stroke-width="3.5" opacity="0.55" filter="url(#glowO)"/>
      </svg>`;
    }
    // ────────────────────────────────────────────────────────────────

    const boardEl    = document.getElementById('board');
    const statusEl   = document.getElementById('status');
    const resetBtn   = document.getElementById('resetBtn');
    const numXEl     = document.getElementById('numX');
    const numOEl     = document.getElementById('numO');
    const labelOEl   = document.getElementById('labelO');
    const modePvPBtn = document.getElementById('modePvP');
    const modeCPUBtn = document.getElementById('modeCPU');

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    const MAX_PER_PLAYER = 3;
    const CPU_PLAYER = 'O';
    const MAX_DEPTH  = 6;

    let cells, moveQueues, currentPlayer, gameOver, scores, vsCPU;

    function init(resetScores) {
      cells         = Array(9).fill(null);
      moveQueues    = { X: [], O: [] };
      currentPlayer = 'X';
      gameOver      = false;
      if (resetScores) scores = { X:0, O:0 };
      setStatus('نوبت بازیکن', 'X');
      renderBoard();
      updateScoreUI();
    }

    function setMode(isCPU) {
      vsCPU = isCPU;
      modePvPBtn.classList.toggle('active', !isCPU);
      modeCPUBtn.classList.toggle('active', isCPU);
      labelOEl.textContent = isCPU ? 'ربات' : 'بازیکن O';
      init(true);
    }
    modePvPBtn.addEventListener('click', () => setMode(false));
    modeCPUBtn.addEventListener('click', () => setMode(true));
    resetBtn.addEventListener('click', () => init(false));

    function setStatus(msg, player) {
      if (!player) { statusEl.innerHTML = msg; return; }
      const cls = player === 'X' ? 'hx' : 'ho';
      statusEl.innerHTML = `${msg} <span class="${cls}">${player}</span>`;
    }

    // مشخص کردن مهره‌هایی که در حرکت بعدی هر بازیکن حذف می‌شن
    function getGhostIndices() {
      const ghosts = new Set();
      // اگه بازیکن فعلی ۳ مهره داره، قدیمی‌ترینش ghost می‌شه
      if (moveQueues[currentPlayer].length >= MAX_PER_PLAYER) {
        ghosts.add(moveQueues[currentPlayer][0]);
      }
      return ghosts;
    }

    function renderBoard(fadeIndex = -1, winLine = []) {
      const ghosts = gameOver ? new Set() : getGhostIndices();
      boardEl.innerHTML = '';
      cells.forEach((value, index) => {
        const btn = document.createElement('button');
        let cls = 'cell';
        if (value === 'X') cls += ' x-cell';
        if (value === 'O') cls += ' o-cell';
        if (index === fadeIndex)        cls += ' fading';
        if (ghosts.has(index))          cls += ' ghost';
        if (winLine.includes(index)) {
          cls += value === 'X' ? ' win-x' : ' win-o';
        }
        btn.className = cls;
        btn.innerHTML = value === 'X' ? makeX() : value === 'O' ? makeO() : '';
        btn.disabled  = !!value || gameOver || (vsCPU && currentPlayer === CPU_PLAYER);
        btn.addEventListener('click', () => handleMove(index));
        boardEl.appendChild(btn);
      });
    }

    function checkWinner(board) {
      for (const [a,b,c] of WIN_LINES) {
        if (board[a] && board[a]===board[b] && board[a]===board[c])
          return { winner:board[a], line:[a,b,c] };
      }
      return null;
    }

    function applyMove(board, queues, index, player) {
      const q = queues[player];
      let removed = -1;
      if (q.length >= MAX_PER_PLAYER) { removed = q.shift(); board[removed] = null; }
      board[index] = player;
      q.push(index);
      return removed;
    }

    function simulateMove(board, queues, index, player) {
      const b = board.slice();
      const q = { X:queues.X.slice(), O:queues.O.slice() };
      applyMove(b, q, index, player);
      return { board:b, queues:q };
    }

    function handleMove(index) {
      if (cells[index] || gameOver) return;
      if (vsCPU && currentPlayer === CPU_PLAYER) return;
      playMove(index, currentPlayer);
      if (!gameOver && vsCPU && currentPlayer === CPU_PLAYER) {
        setStatus('ربات در حال فکر کردن...');
        renderBoard();
        setTimeout(cpuMove, 480);
      }
    }

    function playMove(index, player) {
      const removed = applyMove(cells, moveQueues, index, player);
      if (removed !== -1) renderBoard(removed);

      const result = checkWinner(cells);
      if (result) {
        gameOver = true;
        scores[result.winner]++;
        const label = (vsCPU && result.winner === CPU_PLAYER)
          ? '🤖 ربات برد!' : `🎉 بازیکن ${result.winner} برد!`;
        setStatus(label);
        updateScoreUI(result.winner);
        setTimeout(() => renderBoard(-1, result.line), 60);
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      if (!(vsCPU && currentPlayer === CPU_PLAYER)) {
        const label = (vsCPU && currentPlayer === 'X') ? 'نوبت شما' : 'نوبت بازیکن';
        setStatus(label, currentPlayer);
      }
      renderBoard();
    }

    function cpuMove() {
      if (gameOver) return;
      const best = findBestMove();
      if (best !== -1) playMove(best, CPU_PLAYER);
    }

    function findBestMove() {
      let bestScore=-Infinity, bestMove=-1;
      for (let i=0;i<9;i++) if (!cells[i]) {
        const sim = simulateMove(cells, moveQueues, i, CPU_PLAYER);
        const score = minimax(sim.board, sim.queues, 1, false, CPU_PLAYER, 'X');
        if (score>bestScore) { bestScore=score; bestMove=i; }
      }
      return bestMove;
    }

    function minimax(board, queues, depth, isMax, player, opp) {
      const res = checkWinner(board);
      if (res) return res.winner===player ? 20-depth : depth-20;
      if (depth>=MAX_DEPTH) return 0;
      let best = isMax ? -Infinity : Infinity;
      for (let i=0;i<9;i++) if (!board[i]) {
        const sim = simulateMove(board, queues, i, isMax?player:opp);
        const score = minimax(sim.board, sim.queues, depth+1, !isMax, player, opp);
        best = isMax ? Math.max(best,score) : Math.min(best,score);
      }
      return best;
    }

    function updateScoreUI(flashPlayer) {
      numXEl.textContent = scores.X;
      numOEl.textContent = scores.O;
      if (flashPlayer) {
        const el = flashPlayer==='X' ? numXEl : numOEl;
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
      }
    }

    vsCPU = false;
    init(true);
  </script>
</body>
</html>
