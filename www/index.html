<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>بازی ایکس او</title>
  <style>
    @keyframes popIn {
      0%   { transform: scale(0.4); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0.15; transform: scale(0.8); }
    }
    @keyframes winPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,238,0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(34,211,238,0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scoreFlash {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.4); color: #22d3ee; }
      100% { transform: scale(1); }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, Tahoma, sans-serif;
      background: #060d1a;
      color: #f1f5f9;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      text-align: center;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(34,211,238,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(244,114,182,0.07) 0%, transparent 55%),
        #060d1a;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #22d3ee, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Mode bar */
    #modeBar {
      display: flex;
      gap: 6px;
      background: #0f172a;
      padding: 5px;
      border-radius: 16px;
      border: 1px solid #1e293b;
    }
    .modeBtn {
      font-size: 13px;
      font-weight: 700;
      padding: 9px 20px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: #475569;
      cursor: pointer;
      transition: all 0.25s;
    }
    .modeBtn.active {
      background: linear-gradient(135deg, #22d3ee, #0ea5e9);
      color: #0f172a;
      box-shadow: 0 4px 14px rgba(34,211,238,0.35);
    }

    /* Status */
    #status {
      font-size: 18px;
      font-weight: 700;
      min-height: 26px;
      color: #94a3b8;
      animation: slideDown 0.3s ease;
    }
    #status .highlight {
      color: #22d3ee;
    }

    /* Board */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
    }

    .cell {
      background: #0f172a;
      border: 1.5px solid #1e293b;
      border-radius: 18px;
      font-size: 46px;
      font-weight: 900;
      color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .cell:not(:disabled):hover {
      background: #1e293b;
      border-color: #334155;
    }
    .cell.x {
      color: #22d3ee;
      text-shadow: 0 0 18px rgba(34,211,238,0.5);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cell.o {
      color: #f472b6;
      text-shadow: 0 0 18px rgba(244,114,182,0.5);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cell.fading {
      animation: fadeOut 0.3s ease forwards;
    }
    .cell.win {
      background: #0f2533;
      border-color: #22d3ee;
      animation: winPulse 1s ease infinite;
    }
    .cell.win.o-win {
      background: #230f1e;
      border-color: #f472b6;
      animation: winPulse-o 1s ease infinite;
    }
    @keyframes winPulse-o {
      0%, 100% { box-shadow: 0 0 0 0 rgba(244,114,182,0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(244,114,182,0); }
    }
    .cell:disabled { cursor: default; }

    /* Scores */
    #scoreBoard {
      display: flex;
      gap: 12px;
    }
    .scoreCard {
      background: #0f172a;
      border: 1.5px solid #1e293b;
      border-radius: 16px;
      padding: 12px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 80px;
    }
    .scoreLabel {
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .scoreNum {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }
    #scoreX .scoreNum  { color: #22d3ee; }
    #scoreO .scoreNum  { color: #f472b6; }
    .scoreNum.flash    { animation: scoreFlash 0.4s ease; }

    /* Reset button */
    #resetBtn {
      font-size: 14px;
      font-weight: 700;
      padding: 12px 28px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #22d3ee, #0ea5e9);
      color: #0f172a;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(34,211,238,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #resetBtn:active {
      transform: scale(0.95);
      box-shadow: none;
    }

    #hint {
      font-size: 11px;
      color: #334155;
      max-width: 300px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>ایکس او</h1>

  <div id="modeBar">
    <button class="modeBtn active" id="modePvP">👥 دو نفره</button>
    <button class="modeBtn" id="modeCPU">🤖 با ربات</button>
  </div>

  <div id="status">نوبت بازیکن <span class="highlight">X</span></div>

  <div id="board"></div>

  <div id="scoreBoard">
    <div class="scoreCard" id="scoreX">
      <div class="scoreLabel">بازیکن X</div>
      <div class="scoreNum" id="numX">0</div>
    </div>
    <div class="scoreCard" id="scoreO">
      <div class="scoreLabel" id="labelO">بازیکن O</div>
      <div class="scoreNum" id="numO">0</div>
    </div>
  </div>

  <button id="resetBtn">🔄 شروع دوباره</button>
  <div id="hint">هر بازیکن حداکثر ۳ مهره دارد — مهره‌ی چهارم، قدیمی‌ترین مهره را حذف می‌کند</div>

  <script>
    const boardEl    = document.getElementById('board');
    const statusEl   = document.getElementById('status');
    const resetBtn   = document.getElementById('resetBtn');
    const numXEl     = document.getElementById('numX');
    const numOEl     = document.getElementById('numO');
    const labelOEl   = document.getElementById('labelO');
    const modePvPBtn = document.getElementById('modePvP');
    const modeCPUBtn = document.getElementById('modeCPU');

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    const MAX_PER_PLAYER = 3;
    const CPU_PLAYER = 'O';
    const MAX_DEPTH = 6;

    let cells, moveQueues, currentPlayer, gameOver, scores, vsCPU;

    function init(resetScores) {
      cells         = Array(9).fill(null);
      moveQueues    = { X: [], O: [] };
      currentPlayer = 'X';
      gameOver      = false;
      if (resetScores) scores = { X: 0, O: 0 };
      updateStatus('نوبت بازیکن', 'X');
      renderBoard();
      updateScoreUI();
    }

    function setMode(isCPU) {
      vsCPU = isCPU;
      modePvPBtn.classList.toggle('active', !isCPU);
      modeCPUBtn.classList.toggle('active', isCPU);
      labelOEl.textContent = isCPU ? 'ربات' : 'بازیکن O';
      init(true); // تغییر تب → امتیازها صفر می‌شوند
    }

    modePvPBtn.addEventListener('click', () => setMode(false));
    modeCPUBtn.addEventListener('click', () => setMode(true));
    resetBtn.addEventListener('click', () => init(false)); // فقط صفحه ریست، امتیاز باقی

    function updateStatus(msg, highlight) {
      statusEl.innerHTML = highlight
        ? `${msg} <span class="highlight">${highlight}</span>`
        : msg;
    }

    function renderBoard(fadeIndex = -1, winLine = []) {
      boardEl.innerHTML = '';
      cells.forEach((value, index) => {
        const btn = document.createElement('button');
        let cls = 'cell';
        if (value) cls += ' ' + value.toLowerCase();
        if (index === fadeIndex) cls += ' fading';
        if (winLine.includes(index)) {
          cls += ' win';
          if (value === 'O') cls += ' o-win';
        }
        btn.className = cls;
        btn.textContent = value || '';
        btn.disabled = !!value || gameOver || (vsCPU && currentPlayer === CPU_PLAYER);
        btn.addEventListener('click', () => handleMove(index));
        boardEl.appendChild(btn);
      });
    }

    function checkWinner(board) {
      for (const [a, b, c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return { winner: board[a], line: [a, b, c] };
      }
      return null;
    }

    function applyMove(board, queues, index, player) {
      const q = queues[player];
      let removed = -1;
      if (q.length >= MAX_PER_PLAYER) {
        removed = q.shift();
        board[removed] = null;
      }
      board[index] = player;
      q.push(index);
      return removed;
    }

    function handleMove(index) {
      if (cells[index] || gameOver) return;
      if (vsCPU && currentPlayer === CPU_PLAYER) return;
      playMove(index, currentPlayer);
      if (!gameOver && vsCPU && currentPlayer === CPU_PLAYER) {
        updateStatus('ربات در حال فکر کردن...');
        renderBoard();
        setTimeout(cpuMove, 480);
      }
    }

    function playMove(index, player) {
      const removed = applyMove(cells, moveQueues, index, player);
      if (removed !== -1) renderBoard(removed);

      const result = checkWinner(cells);
      if (result) {
        gameOver = true;
        scores[result.winner]++;
        const label = (vsCPU && result.winner === CPU_PLAYER)
          ? '🤖 ربات برد!'
          : `🎉 بازیکن ${result.winner} برد!`;
        updateStatus(label);
        updateScoreUI(result.winner);
        renderBoard(-1, result.line);
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      if (!(vsCPU && currentPlayer === CPU_PLAYER)) {
        const label = (vsCPU && currentPlayer === 'X') ? 'نوبت شما' : 'نوبت بازیکن';
        updateStatus(label, currentPlayer);
      }
      renderBoard();
    }

    function cpuMove() {
      if (gameOver) return;
      const best = findBestMove();
      if (best !== -1) playMove(best, CPU_PLAYER);
    }

    function simulateMove(board, queues, index, player) {
      const b = board.slice();
      const q = { X: queues.X.slice(), O: queues.O.slice() };
      applyMove(b, q, index, player);
      return { board: b, queues: q };
    }

    function findBestMove() {
      let bestScore = -Infinity, bestMove = -1;
      for (let i = 0; i < 9; i++) {
        if (!cells[i]) {
          const sim = simulateMove(cells, moveQueues, i, CPU_PLAYER);
          const score = minimax(sim.board, sim.queues, 1, false, CPU_PLAYER, 'X');
          if (score > bestScore) { bestScore = score; bestMove = i; }
        }
      }
      return bestMove;
    }

    function minimax(board, queues, depth, isMax, player, opp) {
      const res = checkWinner(board);
      if (res) return res.winner === player ? 20 - depth : depth - 20;
      if (depth >= MAX_DEPTH) return 0;

      let best = isMax ? -Infinity : Infinity;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          const sim = simulateMove(board, queues, i, isMax ? player : opp);
          const score = minimax(sim.board, sim.queues, depth + 1, !isMax, player, opp);
          best = isMax ? Math.max(best, score) : Math.min(best, score);
        }
      }
      return best;
    }

    function updateScoreUI(flashPlayer) {
      numXEl.textContent = scores.X;
      numOEl.textContent = scores.O;
      if (flashPlayer) {
        const el = flashPlayer === 'X' ? numXEl : numOEl;
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
      }
    }

    // شروع اولیه
    vsCPU = false;
    init(true);
  </script>
</body>
</html>
