<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>بازی ایکس او</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, Tahoma, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #94a3b8;
    }
    #modeBar {
      display: flex;
      gap: 8px;
      background: #1e293b;
      padding: 6px;
      border-radius: 14px;
    }
    .modeBtn {
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
    }
    .modeBtn.active {
      background: #22d3ee;
      color: #0f172a;
    }
    #status {
      font-size: 20px;
      font-weight: 600;
      min-height: 28px;
      color: #22d3ee;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 96px);
      grid-template-rows: repeat(3, 96px);
      gap: 8px;
    }
    .cell {
      background: #1e293b;
      border: none;
      border-radius: 14px;
      font-size: 44px;
      font-weight: 800;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .cell.x { color: #22d3ee; }
    .cell.o { color: #f472b6; }
    .cell.fading {
      opacity: 0.4;
    }
    .cell.win {
      background: #334155;
    }
    .cell:disabled {
      cursor: default;
    }
    #resetBtn {
      font-size: 16px;
      font-weight: 600;
      padding: 12px 32px;
      border: none;
      border-radius: 14px;
      background: #22d3ee;
      color: #0f172a;
      cursor: pointer;
    }
    #resetBtn:active {
      transform: scale(0.97);
      background: #0ea5c4;
    }
    #score {
      font-size: 14px;
      color: #64748b;
      display: flex;
      gap: 18px;
    }
    #hint {
      font-size: 12px;
      color: #475569;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <h1>ایکس او بی‌پایان</h1>

  <div id="modeBar">
    <button class="modeBtn active" id="modePvP">دو نفره</button>
    <button class="modeBtn" id="modeCPU">با ربات</button>
  </div>

  <div id="status">نوبت بازیکن X</div>
  <div id="board"></div>
  <button id="resetBtn">شروع دوباره</button>
  <div id="score">
    <span id="scoreX">X: 0</span>
    <span id="scoreO">O: 0</span>
  </div>
  <div id="hint">هر بازیکن حداکثر ۳ مهره دارد؛ مهره‌ی چهارم باعث حذف قدیمی‌ترین مهره می‌شود. بازی مساوی ندارد.</div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('resetBtn');
    const scoreXEl = document.getElementById('scoreX');
    const scoreOEl = document.getElementById('scoreO');
    const modePvPBtn = document.getElementById('modePvP');
    const modeCPUBtn = document.getElementById('modeCPU');

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    const MAX_PER_PLAYER = 3;

    let cells = Array(9).fill(null);
    let moveQueues = { X: [], O: [] }; // ترتیب حرکت‌های هر بازیکن برای حذف قدیمی‌ترین
    let currentPlayer = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0 };
    let vsCPU = false;
    const CPU_PLAYER = 'O';

    modePvPBtn.addEventListener('click', () => setMode(false));
    modeCPUBtn.addEventListener('click', () => setMode(true));

    function setMode(isCPU) {
      vsCPU = isCPU;
      modePvPBtn.classList.toggle('active', !isCPU);
      modeCPUBtn.classList.toggle('active', isCPU);
      resetGame();
    }

    function renderBoard(fadeIndex) {
      boardEl.innerHTML = '';
      cells.forEach((value, index) => {
        const btn = document.createElement('button');
        let cls = 'cell';
        if (value) cls += ' ' + value.toLowerCase();
        if (index === fadeIndex) cls += ' fading';
        btn.className = cls;
        btn.textContent = value || '';
        const locked = !!value || gameOver || (vsCPU && currentPlayer === CPU_PLAYER);
        btn.disabled = locked;
        btn.addEventListener('click', () => handleMove(index));
        boardEl.appendChild(btn);
      });
    }

    function checkWinner(board) {
      for (const line of WIN_LINES) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line };
        }
      }
      return null; // بدون حالت مساوی
    }

    function handleMove(index) {
      if (cells[index] || gameOver) return;
      if (vsCPU && currentPlayer === CPU_PLAYER) return;
      playMove(index, currentPlayer);

      if (!gameOver && vsCPU && currentPlayer === CPU_PLAYER) {
        statusEl.textContent = 'نوبت ربات...';
        renderBoard();
        setTimeout(cpuMove, 450);
      }
    }

    // اعمال یک حرکت با منطق حذف قدیمی‌ترین مهره در صورت رسیدن به سقف ۳
    function applyMove(board, queues, index, player) {
      const queue = queues[player];
      if (queue.length >= MAX_PER_PLAYER) {
        const oldest = queue.shift();
        board[oldest] = null;
      }
      board[index] = player;
      queue.push(index);
    }

    function playMove(index, player) {
      const queue = moveQueues[player];
      let removedIndex = -1;
      if (queue.length >= MAX_PER_PLAYER) {
        removedIndex = queue[0];
      }

      applyMove(cells, moveQueues, index, player);

      if (removedIndex !== -1) {
        renderBoard(removedIndex);
      }

      const result = checkWinner(cells);
      if (result) {
        gameOver = true;
        const label = (vsCPU && result.winner === CPU_PLAYER) ? 'ربات' : 'بازیکن ' + result.winner;
        statusEl.textContent = label + ' برد! 🎉';
        scores[result.winner]++;
        if (result.winner === 'X') {
          scoreXEl.textContent = 'X: ' + scores.X;
        } else {
          scoreOEl.textContent = 'O: ' + scores.O;
        }
        highlightWin(result.line);
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      if (!(vsCPU && currentPlayer === CPU_PLAYER)) {
        statusEl.textContent = 'نوبت بازیکن ' + currentPlayer;
      }
      renderBoard();
    }

    function cpuMove() {
      if (gameOver) return;
      const bestIndex = findBestMove();
      if (bestIndex !== -1) {
        playMove(bestIndex, CPU_PLAYER);
      }
    }

    // شبیه‌سازی حرکت روی یک کپی از وضعیت فعلی برای ارزیابی Minimax
    function simulateMove(board, queues, index, player) {
      const newBoard = board.slice();
      const newQueues = { X: queues.X.slice(), O: queues.O.slice() };
      applyMove(newBoard, newQueues, index, player);
      return { board: newBoard, queues: newQueues };
    }

    function findBestMove() {
      const opponent = CPU_PLAYER === 'X' ? 'O' : 'X';
      let bestScore = -Infinity;
      let bestMove = -1;
      const emptyCells = [];
      for (let i = 0; i < 9; i++) if (!cells[i]) emptyCells.push(i);

      for (const i of emptyCells) {
        const sim = simulateMove(cells, moveQueues, i, CPU_PLAYER);
        const score = minimax(sim.board, sim.queues, 1, false, CPU_PLAYER, opponent);
        if (score > bestScore) {
          bestScore = score;
          bestMove = i;
        }
      }
      return bestMove;
    }

    // محدودیت عمق چون بازی بی‌پایان است و درخت حالت‌ها تمام نمی‌شود
    const MAX_DEPTH = 6;

    function minimax(board, queues, depth, isMaximizing, player, opponent) {
      const result = checkWinner(board);
      if (result) {
        if (result.winner === player) return 20 - depth;
        if (result.winner === opponent) return depth - 20;
      }
      if (depth >= MAX_DEPTH) return 0;

      const emptyCells = [];
      for (let i = 0; i < 9; i++) if (!board[i]) emptyCells.push(i);

      if (isMaximizing) {
        let best = -Infinity;
        for (const i of emptyCells) {
          const sim = simulateMove(board, queues, i, player);
          best = Math.max(best, minimax(sim.board, sim.queues, depth + 1, false, player, opponent));
        }
        return best;
      } else {
        let best = Infinity;
        for (const i of emptyCells) {
          const sim = simulateMove(board, queues, i, opponent);
          best = Math.min(best, minimax(sim.board, sim.queues, depth + 1, true, player, opponent));
        }
        return best;
      }
    }

    function highlightWin(line) {
      line.forEach(i => {
        const btn = boardEl.children[i];
        if (btn) btn.classList.add('win');
      });
    }

    function resetGame() {
      cells = Array(9).fill(null);
      moveQueues = { X: [], O: [] };
      currentPlayer = 'X';
      gameOver = false;
      statusEl.textContent = 'نوبت بازیکن X';
      renderBoard();
    }

    resetBtn.addEventListener('click', resetGame);
    renderBoard();
  </script>
</body>
</html>
